syntax = "proto3";

package usercenterapi;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

message GetActivityFriendWinInfoReq {

}

message GetActivityFriendWinInfoResp {
  // 连胜被邀请列表
  repeated FriendWinInfo invite_list = 1;
  // 连胜邀请列表
  repeated FriendWinInfo my_invite_list = 2;
  // 连胜进行中列表-我的流程中的用户
  repeated FriendWinInfo progress_list = 3;
}

message FriendWinInfo {
  // 用户ID
  int64 uid = 1;
  // 用户昵称
  string name = 2;
  // 用户头像
  string avatar = 3;
  // 连胜次数
  int64 win_count = 4;
  // 邀请状态 1:邀请中 2:进行中
  int64 status = 5;
  // 今日是否完成连胜
  bool is_win_today = 6;
}

message GetUserFriendListReq {
  int64 limit = 1;
  int64 offset = 2;
}

message FollowUserInfo {
  // 用户ID
  int64 id = 1;
  // 用户昵称
  string name = 2;
  // 用户头像
  string avatar = 3;
  // 关注时间
  int64 follow_time = 4;
}

message GetUserFriendListResp {
  int64 offset = 1;
  int64 total = 2;
  bool more = 3;
  repeated FollowUserInfo list = 4;
}

message UserFriendWinChangeReq {
  // 修改连胜关系的用户ID
  int64 uid = 1;
  // 修改类型 1-邀请 2-同意 3-移除 4-撤回邀请
  int64 change_type = 2;
}

message UserFriendWinChangeResp {

}

service UserCenterHttpService {
    // 用户-友情连胜页信息
    rpc GetActivityFriendWinInfo(GetActivityFriendWinInfoReq) returns (GetActivityFriendWinInfoResp) {
      option (google.api.http) = {
        post: "/base/readcamp/activity/friend_win/info"
      };
    }
    // 用户-互关好友列表
    rpc GetUserFriendList(GetUserFriendListReq) returns (GetUserFriendListResp) {
      option (google.api.http) = {
        post: "/base/readcamp/user/friend/list"
      };
    }
    // 用户-友情连胜关系变更
    rpc UserFriendWinChange(UserFriendWinChangeReq) returns (UserFriendWinChangeResp) {
      option (google.api.http) = {
        post: "/base/readcamp/user/friend_win/change"
      };
    }
}
