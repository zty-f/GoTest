syntax = "proto3";

package usercenterapi;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// 群类型
enum GroupType {
  GroupTypeInvalid = 0;
  // 内部群
  InnerGroup = 1;
  // 外部群
  ExternalGroup = 2;
}

// 聊天类型
enum ChatType {
  ChatTypeInvalid = 0;
  // 私聊
  SingleChat = 1;
  // 群聊
  GroupChat = 2;
}

enum SortType {
  SortTypeInvalid = 0;
  // 正序
  AscSortType = 1;
  // 逆序
  DescSortType = 2;
}

// 表情包类型
enum EmotionType {
  EmotionTypeInvalid = 0;
  // gif
  Gif_Emotion = 1;
  // png
  Png_Emotion = 2;
}

message MsgContent {
  // @inject_tag: json:"text,omitempty"
  QwMsgText text = 1;
  // @inject_tag: json:"image,omitempty"
  QwMsgMedia image = 2;
  // @inject_tag: json:"revoke,omitempty"
  QwMsgRevoke revoke = 3;
  // @inject_tag: json:"voice,omitempty"
  QwMsgMedia voice = 4;
  // @inject_tag: json:"video,omitempty"
  QwMsgMedia video = 5;
  // @inject_tag: json:"card,omitempty"
  QwMsgCard card = 6;
  // @inject_tag: json:"location,omitempty"
  QwMsgLocation location = 7;
  // @inject_tag: json:"emotion,omitempty"
  QwMsgEmotion emotion = 8;
  // @inject_tag: json:"file,omitempty"
  QwMsgFile file = 9;
  // @inject_tag: json:"link,omitempty"
  QwMsgLink link = 10;
  // @inject_tag: json:"weapp,omitempty"
  QwMsgWeapp weapp = 11;
  // @inject_tag: json:"meeting_voice_call,omitempty"
  QwMsgMeetingVoiceCall meeting_voice_call = 12;
  // @inject_tag: json:"other,omitempty"
  string other = 13;
  // @inject_tag: json:"meeting,omitempty"
  QwMsgMeeting meeting = 14;
}

message QwMsgText {
  // @inject_tag: json:"content,omitempty"
  string content = 1;
}

message QwMsgMedia {
  // @inject_tag: json:"filesize,omitempty"
  int64 filesize = 1;
  // @inject_tag: json:"url,omitempty"
  string url = 2;
  // @inject_tag: json:"md5sum,omitempty"
  string md5sum = 3;
  // @inject_tag: json:"play_length,omitempty"
  int64 play_length = 4;
}

message QwMsgRevoke {
  // @inject_tag: json:"pre_msgid,omitempty"
  string pre_msgid = 1;
}

message QwMsgCard {
  // @inject_tag: json:"corpname,omitempty"
  string corpname = 1;
  // @inject_tag: json:"userid,omitempty"
  string userid = 2;
}

message QwMsgLocation {
  // @inject_tag: json:"latitude,omitempty"
  double latitude = 1;
  // @inject_tag: json:"longitude,omitempty"
  double longitude = 2;
  // @inject_tag: json:"title,omitempty"
  string title = 3;
  // @inject_tag: json:"address,omitempty"
  string address = 4;
  // @inject_tag: json:"zoom,omitempty"
  int64 zoom = 5;
}

message QwMsgEmotion {
  // @inject_tag: json:"imagesize,omitempty"
  int64 imagesize = 1;
  // @inject_tag: json:"url,omitempty"
  string url = 2;
  // @inject_tag: json:"md5sum,omitempty"
  string md5sum = 3;
  // @inject_tag: json:"width,omitempty"
  int64 width = 4;
  // @inject_tag: json:"height,omitempty"
  int64 height = 5;
  // @inject_tag: json:"type,omitempty"
  EmotionType type = 6;
}

message QwMsgFile {
  // @inject_tag: json:"filesize,omitempty"
  int64 filesize = 1;
  // @inject_tag: json:"url,omitempty"
  string url = 2;
  // @inject_tag: json:"md5sum,omitempty"
  string md5sum = 3;
  // @inject_tag: json:"filename,omitempty"
  string filename = 4;
  // @inject_tag: json:"fileext,omitempty"
  string fileext = 5;
}

message QwMsgLink {
  // @inject_tag: json:"title,omitempty"
  string title = 1;
  // @inject_tag: json:"description,omitempty"
  string description = 2;
  // @inject_tag: json:"link_url,omitempty"
  string link_url = 3;
  // @inject_tag: json:"image_url,omitempty"
  string image_url = 4;
}

message QwMsgWeapp {
  // @inject_tag: json:"title,omitempty"
  string title = 1;
  // @inject_tag: json:"description,omitempty"
  string description = 2;
  // @inject_tag: json:"username,omitempty"
  string username = 3;
  // @inject_tag: json:"displayname,omitempty"
  string displayname = 4;
}

message QwMsgMeetingVoiceCall {
  // @inject_tag: json:"url,omitempty"
  string url = 1;
  // @inject_tag: json:"endtime,omitempty"
  int64 endtime = 2;
  // @inject_tag: json:"play_length,omitempty"
  int64 play_length = 3;
  // @inject_tag: json:"displayname,omitempty"
  string displayname = 4;
  // @inject_tag: json:"demofiledata,omitempty"
  repeated QwMsgDemofiledata demofiledata = 5;
  // @inject_tag: json:"sharescreendata,omitempty"
  repeated QwMsgSharescreendata sharescreendata = 6;
}

message QwMsgMeeting {
  // @inject_tag: json:"topic,omitempty"
  string topic = 1;
  // @inject_tag: json:"starttime,omitempty"
  int64 starttime = 2;
  // @inject_tag: json:"endtime,omitempty"
  int64 endtime = 3;
  // @inject_tag: json:"address,omitempty"
  string address = 4;
  // @inject_tag: json:"remarks,omitempty"
  string remarks = 5;
  // @inject_tag: json:"meetingid,omitempty"
  int64 meetingid = 6;
}

message QwMsgDemofiledata {
  // @inject_tag: json:"demooperator,omitempty"
  string demooperator = 1;
  // @inject_tag: json:"endtime,omitempty"
  int64 endtime = 2;
  // @inject_tag: json:"starttime,omitempty"
  int64 starttime = 3;
  // @inject_tag: json:"filename,omitempty"
  string filename = 4;
}

message QwMsgSharescreendata {
  // @inject_tag: json:"endtime,omitempty"
  int64 endtime = 1;
  // @inject_tag: json:"share,omitempty"
  string share = 2;
  // @inject_tag: json:"starttime,omitempty"
  int64 starttime = 3;
}

// 聊天消息
message MsgInfo {
  // 企业id
  string corp_id = 1;
  // 聊天类型
  ChatType chat_type = 2;
  // 消息类型
  string msg_type = 3;
  // 消息发起者account
  string from_account = 4;
  // 消息接受者account
  repeated string to_account = 5;
  // 消息产生时间 (UNIX时间戳) 单位是ms(毫秒)
  int64 msgtime = 6;
  // 消息内容
  MsgContent content = 7;
  // 消息ID
  string msgid = 8;
  // 自增qwmsgid
  int64 qw_msgid = 9;
  // roomid
  string roomid = 10;
}

enum SortFieldType {
  Unknown = 0;
  Qw_Msgid = 1;
}

message GetQwChatMsgListReq {
  // 会话对象1
  string from_account = 1;
  // 会话对象2
  string to_account = 2;
  // 消息类型  文本：text 图片：image 文件：file 链接：link
  string msg_type = 3;
  // 消息发送时间-秒级
  int64 msgtime = 4;
  // 截止时间-秒级
  int64 msgtime_end = 5;
  // 消息量
  int32 limit = 6;
  // 偏移量
  int32 offset = 7;
}

message GetQwChatMsgListResp {
  repeated MsgInfo items = 1;
  int64 first_msg_time = 2;
  bool more = 3;
  int64 total = 4;
}

service UserCenterHttpService {
  // 【api】- 企微聊天信息列表查询
  rpc GetQwChatMsgList(GetQwChatMsgListReq) returns (GetQwChatMsgListResp) {
    option (google.api.http) = {
      post: "/admin/base/readcamp/qwchat_msg/list"
    };
  }
}