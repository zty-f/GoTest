syntax = "proto3";

package usercenterapi;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// 达人数据
message DarenDataInfo {
  // 主键id
  int64 id = 1;
  // 达人id
  string did = 2;
  // 达人平台
  int64 platform = 3;
  // 达人名称
  string name = 4;
  // 操作人
  string oper = 5;
  // 备注信息
  string remark = 6;
  // 创建时间
  int64 ct = 7;
  // 更新时间
  int64 ut = 8;
}

// 新增/编辑达人信息请求
message UpsertDarenDataReq {
  // 主键id，编辑时传入，新增时不传
  int64 id = 1;
  // 达人id
  string did = 2;
  // 达人平台
  int64 platform = 3;
  // 达人名称
  string name = 4;
  // 备注信息
  string remark = 5;
}

// 新增/编辑达人信息响应
message UpsertDarenDataRes {
  // 主键id
  int64 id = 1;
}

// 达人列表查询请求
message ListDarenDataReq {
  // 达人id（精确匹配）
  string did = 1;
  // 达人平台
  int64 platform = 2;
  // 达人名称（模糊匹配）
  string name = 3;
  // 分页大小
  int64 limit = 4;
  // 分页偏移
  int64 offset = 5;
}

// 达人列表查询响应
message ListDarenDataRes {
  repeated DarenDataInfo items = 1;
  int64 total = 2;
  int64 offset = 3;
  bool more = 4;
}

// 达人删除请求
message DeleteDarenDataReq {
  // 主键id
  int64 id = 1;
}

// 达人删除响应
message DeleteDarenDataRes {
}



service UserCenterHttpService {
  // 【api】达人信息新增/编辑
  rpc UpsertDarenData(UpsertDarenDataReq) returns(UpsertDarenDataRes) {
    option (google.api.http) = {
      post: "/readcampopapi/daren/upsert"
    };
  }
  // 【api】达人列表查询
  rpc ListDarenData(ListDarenDataReq) returns(ListDarenDataRes) {
    option (google.api.http) = {
      post: "/readcampopapi/daren/list"
    };
  }
  // 【api】达人删除
  rpc DeleteDarenData(DeleteDarenDataReq) returns(DeleteDarenDataRes) {
    option (google.api.http) = {
      post: "/readcampopapi/daren/delete"
    };
  }
}
